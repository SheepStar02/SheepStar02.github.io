<html>
    <body style="background-color: black;">  
        <div style="background-color: transparent;width:500px;left:0px;position:absolute">
            <button type="button" style="border:none;background-color:transparent;">
                <a href="page1">
                    <img src="potato.png" alt="Smiley face" style="width:70;height:50;left:200px;position:absolute;">
                </a>
            </button>
            <button type="button" style="border:none;background-color:transparent;left:30px" onclick = small()>
                <script>
                    function small () {
                        document.getElementById("badger").style = "width:800;height:800;visibility:visible;position:absolute;left:200px";
                        console.log("showing");
                    }
                </script>
                <img src="potato.png" alt="Smiley face" style="width:70;height:50;left:270px;position:absolute;">
            </button>
            <button type="button" style="border:none;background-color:transparent;" onclick = show()>
                    <script>
                        function show () {
                            document.getElementById("badger").style = "width:8000;height:8000;visibility:visible;position:absolute;left:0px";
                        }
                    </script>
                    <img src="potato.png" alt="Smiley face" style="width:140;height:100;left:340px;position:absolute">
            </button>
            <img id = "badger" src = "badger.png" style="width:800;height:800;visibility:hidden;position:absolute;left:200px">
        </div> 
    </body>
</html>
