<!DOCTYPE html>
<html lang="en"> 
    <body style = "background-color: black;">  
    <div id = "wrapper">
    <div class = "background-image">
        <img class = "dp-background" src = "darkprince.png">
        <img class = "ewiz-background" src = "ewiz.png">
    </div>
    <div class = "user-input">
        <div class = "title">
            <h1 style = "color:greenyellow;font-size:60px;left:500px">
                Find Your Bracket
            </h1>
        </div>
        <div class = "join-tournament">
            <button class = "join-tournament-button" type = "submit" onclick = "message();">
                Search 
            </button>
        </div> 
        <div class = "tourney-code-input">
            <input class = "tourney-code-input" type="input" placeholder="TOURNEY CODE" maxlength="4" autocomplete="off">
        </div>
        <div class = "or">
            <h1 style = "color:orange;font-size:60px">
                OR
            </h1>
            <button class = "create-tournament-button" type = "submit">
                <a class = "create-tournament-link" href = "create-tournament"> Create Custom Tournament </a>
            </button>
        </div>
    </div>
    </div>
    </body> 
    <style>
        div.background-image{
            position:absolute;
            width:99vw;}
        img.dp-background{
            width:500px;
            top:50px;
            position:absolute}
        img.ewiz-background{
            left:1000px;
            width:500px;
            position:absolute;
        }
        div.user-input{
            left:500px;
            width:500px;
            height:90vh;
            position:absolute;
        }
        div.title{
            width:500px;
            position:relative;
            text-align:center;
            white-space:nowrap;}
        div.join-tournament{
            width:500px;
            top:250px;
            position:absolute;
            text-align:center;}
        button.join-tournament-button{
            background-color:blue;
            width:150px;
            height:35px;
            font-size:25px;
            font-weight:bold;
            font-family:verdana;
            border-radius:12px;
            cursor:pointer;
            border:none;
            outline:none;}
        button.join-tournament-button:hover{background-color: #190bb1}
        div.tourney-code-input{
            width:500px;
            top:180px;
            position:absolute;;
            text-align:center;}
        input.tourney-code-input{
            background-color:white;
            width:200px;
            height:35px;
            font-size:20px;
            font-weight:bold;
            font-family:verdana;
            text-align:center;
            text-transform:uppercase;
            border-radius:5px;
            cursor:auto;
            border:none;
            outline:none;}
        div.or{
            width:500px;
            top:300px;;
            position:absolute;
            text-align:center;}
        button.create-tournament-button{
            background-color:blueviolet;
            width:450px;
            height:50px;
            border-radius:12px;
            cursor:pointer;
            border:none;
            outline:none;}
        button.create-tournament-button:hover{background-color: #720680}
        a.create-tournament-link{            
            font-size:25px;
            color:black;
            text-decoration:none;
            font-weight:bold;
            font-family:verdana;}
    </style>
</html>
