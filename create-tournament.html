<!DOCTYPE html>
<html lang = "en">
    <body style = "background-color:black;">
    <div id = wrapper class = "wrapper" style = "height:95vh">
    <div id = "twitch-login" class = "twitch-login">
        <label class = "username-input-label">Twitch Username</label>
        <input id = "username-input" class = "username-input" type = "text" autocomplete="off" spellcheck = "false" maxlength= 25></input>
        <button id = "username-confirm" class = "username-confirm" onclick = "confirmTwitchUsername();">confirm</button>
        <label id = "username-input-instructions" class = "username-input-instructions">
            Click the "confirm" button after entering your Twitch username
        </label>
        <a id = "your-chatbox" class = "your-channel" target = "_blank">your chatbox</a>
        <a id = "wetbot-twitchlink" class = "wetbot-twitchlink" href = "https://twitch.tv/wetbotesl" target = "_blank">twitch.tv/wetbotesl</a>
    </div>
    <div class = "create-tournament">
        <button class = "create-tournament-button" type = "submit" onclick = "createTournament();">
            Create Tournamen
        </button>
    </div>
    <div id = "tournament-type" class = "tournament-type">
        <label class = "tournament-type-label">Tournament Chooser</label>    
        <label id = "teamvteam-label" class = "teamvteam-label">
            <input id = "tournament-type-teamvteam" class = "tournament-type-teamvteam" type = "radio" checked>  Team VS Team</input>
        </label>
        <p id = "tournament-type-info" class = "tournament-type-info">
            Bracket mode coming soon. There are no other option right now :P
        </p>
    </div>
    <div id = tournament-players class = tournament-players>
        <label class = "tournament-players-label">Max Players</label>
        <input id = "tournament-players-input" class = "tournament-players-input" type = "text" maxlength = 2></input>
        <p class = "tournament-players-info">Enter the max number of players (2-50)</p>
        </label>
    </div>
    <div id = "twitch-announce" class = "twitch-announce">
        <label class = "twitch-announce-label">Announce On Twitch</label>    
        <label id = "announce-label" class = "announce-label">
            <input id = "announce-radio" class = "announce-radio" type = "checkbox">  Announce</input>
        </label>
        <p id = "twitch-announce-info" class = "twitch-announce-info">
            When selected, Wetbot will post the tournament details in your connected twitch channel.
        </p>
    </div>
    </div>
    </body>
    <script src = tmi.min.js></script>
    <script type = "text/javascript" src = "create-tournament.js"></script>
